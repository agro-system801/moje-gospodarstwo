<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroManager PRO v32</title>
    <style>
        :root { --p: #4caf50; --s: #2196f3; --a: #ff9800; --r: #f44336; --m: #00bcd4; --bg: #121212; --card: #1e1e1e; --txt: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 14px; }
        
        /* Pasek nawigacji */
        .nav { display: flex; background: #1b1b1b; padding: 5px; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        .nav button { flex: 1 1 18%; background: none; border: none; color: #888; padding: 12px 2px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .nav button.active { color: var(--p); border-bottom: 3px solid var(--p); }
        
        /* Główne okno */
        .tab { display: none; padding: 15px; max-width: 800px; margin: auto; padding-bottom: 80px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Formularze */
        label { font-size: 11px; color: #aaa; text-transform: uppercase; margin-top: 10px; display: block; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; color: #fff; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        
        /* Raporty */
        .rep-sekcja { background: #181818; padding: 10px; border-radius: 8px; margin-top: 15px; border-left: 4px solid; }
        .rep-suma { background: #222; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; border-radius: 4px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; font-size: 10px; text-transform: uppercase; }
        .zysk { color: var(--p); } .koszt { color: var(--r); }
    </style>
</head>
<body>

<div class="nav">
    <button id="b_m" onclick="go('m')" class="active">🚜 MASZYNY</button>
    <button id="b_p" onclick="go('p')">🌱 POLA</button>
    <button id="b_st" onclick="go('st')">📦 MAGAZYN</button>
    <button id="b_ml" onclick="go('ml')">🥛 MLEKO</button>
    <button id="b_r" onclick="go('r')">📊 RAPORTY</button>
</div>
