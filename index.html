<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroManager v27</title>
    <style>
        :root { --p: #4caf50; --bg: #121212; --card: #1e1e1e; --txt: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 10px; }
        .nav { display: flex; justify-content: space-around; background: #1b1b1b; padding: 10px; border-bottom: 2px solid var(--p); margin-bottom: 20px; }
        .nav button { background: none; border: 1px solid #444; color: #fff; padding: 10px; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .tab { display: none; }
        .tab.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 5px; color: #fff; font-weight: bold; cursor: pointer; background: var(--p); }
        h4 { margin: 10px 0; color: var(--p); border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="nav">
    <button onclick="go('f')">MASZYNY</button>
    <button onclick="go('p')">POLA</button>
    <button onclick="go('r')">RAPORTY</button>
</div>

<div id="f" class="tab active">
    <div class="card">
        <h3>Dodaj Maszynę</h3>
        <input type="text" id="m_in" placeholder="Nazwa (np. Case)">
        <button class="btn" onclick="addM()">DODAJ MASZYNĘ</button>
    </div>
    <div class="card">
        <h3>Tankowanie</h3>
        <select id="m_sel"></select>
        <input type="number" id="m_litry" placeholder="Ilość litrów">
        <button class="btn" style="background:#ff9800" onclick="addH()">ZAPISZ PALIWO</button>
    </div>
</div>

<div id="p" class="tab">
    <div class="card">
        <h3>Nowe Pole</h3>
        <input type="text" id="p_in" placeholder="Nazwa pola">
        <button class="btn" style="background:#2196f3" onclick="addP()">DODAJ POLE</button>
    </div>
</div>

<div id="r" class="tab">
    <div class="card">
        <h3>Twoje Dane</h3>
        <div id="list_m"><h4>Maszyny:</h4></div>
        <div id="list_p"><h4>Pola:</h4></div>
        <div id="list_h"><h4>Historia:</h4></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:red; margin-top:30px; cursor:pointer;">[ USUŃ WSZYSTKO ]</button>
    </div>
</div>

<script>
    // BAZA DANYCH
    let d = JSON.parse(localStorage.getItem('agro_v27')) || { m: [], p: [], h: [] };

    function go(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        render();
    }

    function addM() {
        let val = document.getElementById('m_in').value;
        if(val) { d.m.push(val); save(); }
    }

    function addP() {
        let val = document.getElementById('p_in').value;
        if(val) { d.p.push(val); save(); }
    }

    function addH() {
        let m = document.getElementById('m_sel').value;
        let l = document.getElementById('m_litry').value;
        if(m && l) { d.h.push(new Date().toLocaleDateString() + ": " + m + " - " + l + "L"); save(); }
    }

    function save() {
        localStorage.setItem('agro_v27', JSON.stringify(d));
        location.reload(); // To przeładuje stronę i odświeży widok - najbezpieczniejsza opcja
    }

    function render() {
        // Lista w select
        let s = document.getElementById('m_sel');
        s.innerHTML = '<option value="">-- wybierz --</option>';
        d.m.forEach(m => s.innerHTML += `<option value="${m}">${m}</option>`);

        // Listy w raportach
        document.getElementById('list_m').innerHTML = "<h4>Maszyny:</h4>" + d.m.join(", ");
        document.getElementById('list_p').innerHTML = "<h4>Pola:</h4>" + d.p.join(", ");
        document.getElementById('list_h').innerHTML = "<h4>Historia:</h4>" + d.h.map(x => `<div>${x}</div>`).join("");
    }

    render();
</script>

</body>
</html>
