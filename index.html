<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroManager v29 - Widok Pełny</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        .sekcja { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 2px solid #333; margin-bottom: 40px; }
        h2 { color: #4caf50; border-bottom: 2px solid #4caf50; padding-bottom: 10px; margin-top: 0; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 5px; }
        .b-zielony { background: #4caf50; }
        .b-pomarancz { background: #ff9800; }
        .b-niebieski { background: #2196f3; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #181818; }
        th, td { padding: 10px; border: 1px solid #333; text-align: left; font-size: 13px; }
        th { background: #222; color: #4caf50; }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:#4caf50;">🚜 AGRO-SYSTEM</h1>
    <p style="text-align:center; font-size:12px;">Wszystkie działy są poniżej. Przewijaj palcem.</p>

    <div class="sekcja">
        <h2>🚜 MASZYNY</h2>
        <input type="text" id="m_nazwa" placeholder="Nazwa maszyny">
        <button class="b-zielony" onclick="dodajMaszyne()">DODAJ MASZYNĘ</button>
        <hr style="margin:25px 0; border:1px solid #333;">
        <select id="m_lista"></select>
        <input type="number" id="m_litry" placeholder="Ilość litrów">
        <button class="b-pomarancz" onclick="zapiszPaliwo()">ZAPISZ TANKOWANIE</button>
    </div>

    <div class="sekcja">
        <h2>🌱 POLA</h2>
        <input type="text" id="p_nazwa" placeholder="Nazwa pola">
        <input type="number" id="p_ha" placeholder="Hektary">
        <button class="b-niebieski" onclick="dodajPole()">DODAJ POLE</button>
    </div>

    <div class="sekcja">
        <h2>📊 RAPORTY</h2>
        <div id="wynik_m"></div>
        <div id="wynik_p"></div>
        <div id="wynik_h"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid red; color:red; margin-top:50px;">WYCZYŚĆ WSZYSTKO</button>
    </div>

<script>
    // BAZA DANYCH
    var baza = JSON.parse(localStorage.getItem('agro_v29')) || { maszyny: [], pola: [], historia: [] };

    function odswiezWidok() {
        // Lista w select
        var s = document.getElementById('m_lista');
        s.innerHTML = '<option value="">-- wybierz maszynę --</option>';
        baza.maszyny.forEach(function(m) { s.innerHTML += '<option value="'+m+'">'+m+'</option>'; });

        // Tabela Maszyn
        document.getElementById('wynik_m').innerHTML = '<h4>Maszyny:</h4>' + baza.maszyny.join(", ");
        
        // Tabela Pól
        document.getElementById('wynik_p').innerHTML = '<h4>Pola:</h4>' + baza.pola.map(function(p){ return p.n + ' (' + p.h + ' ha)'; }).join(", ");

        // Tabela Historii
        var hHtml = '<h4>Ostatnie tankowania:</h4><table><tr><th>Data</th><th>Co</th><th>Ile</th></tr>';
        baza.historia.forEach(function(h) {
            hHtml += '<tr><td>'+h.d+'</td><td>'+h.o+'</td><td>'+h.v+' L</td></tr>';
        });
        hHtml += '</table>';
        document.getElementById('wynik_h').innerHTML = hHtml;
    }

    function dodajMaszyne() {
        var n = document.getElementById('m_nazwa').value;
        if(n) { baza.maszyny.push(n); zapiszIBaza(); document.getElementById('m_nazwa').value = ""; }
    }

    function dodajPole() {
        var n = document.getElementById('p_nazwa').value;
        var h = document.getElementById('p_ha').value;
        if(n && h) { baza.pola.push({n:n, h:h}); zapiszIBaza(); document.getElementById('p_nazwa').value = ""; document.getElementById('p_ha').value = ""; }
    }

    function zapiszPaliwo() {
        var m = document.getElementById('m_lista').value;
        var l = document.getElementById('m_litry').value;
        if(m && l) {
            baza.historia.push({d: new Date().toLocaleDateString(), o: m, v: l});
            zapiszIBaza();
            document.getElementById('m_litry').value = "";
        }
    }

    function zapiszIBaza() {
        localStorage.setItem('agro_v29', JSON.stringify(baza));
        odswiezWidok();
        alert("ZAPISANO!");
    }

    // Start
    odswiezWidok();
</script>

</body>
</html>
